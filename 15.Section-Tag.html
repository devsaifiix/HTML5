<!-- The <section> tag in HTML is used to define a separate section or part of a webpage. It groups
related content together under a common theme or topic. Usually, a section contains a heading
and related paragraphs, images, or other elements.

The <section> tag is a semantic tag, which means it clearly describes the purpose of the content. 
It helps organize the webpage structure and makes it easier for browsers, search engines, and 
developers to understand different parts of the page. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section Tag</title>

    <style>
        section{
            background-color: lightyellow;
            padding: 15px;
            margin: 10px;
            border: 1px solid gray
        }
    </style>
</head>
<body>
    <h1>My Website</h1>

    <section>
        <h2>About Us</h2>
        <p>
            We provide educational content to help students learn web development. 
        </p>
    </section>

    <section>
        <h2>Our Services</h2>
        <p>
            We offer tutorials on HTML, CSS, JavaScript, and other programming languages.
        </p>
    </section>
</body>
</html>
