<!-- The <main> tag in HTML is used to define the main content of a webpage. It contains the primary
information that is directly related to the main topic of the page. The main tag helps organize the
webpage structure and makes it easier for browsers, search engines, and screen readers to understand
the most important content.

The content inside the <main> tag should be unique to that webpage and should not include repeated 
elements like headers, navigation menus, sidebars, or footers. It usually contains important elements
such as articles, sections, paragraphs, images, or headings. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mian Tag</title>
</head>
<body>
    <header>
        <h1>My Website</h1>
    </header>

    <main>
        <h2>Mian Content</h2>
        <p>
            This section contains the main information of the webpage.
            It explain the topic that the page is about.
        </p>
    </main>

    <footer>
        <p>Copyright © 2026 My Website</p>
    </footer>
</body>
</html>
