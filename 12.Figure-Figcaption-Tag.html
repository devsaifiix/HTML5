<!-- In HTML, the <figure> and <figcaption> tags are used to display images, diagrams, code snippets,
     or illustrations with a caption (description). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure and Figcaption Tag</title>
    <style>
        h2{
            color: rgb(79, 16, 195);
            font-size: 40px;
            text-align: none;
            margin-bottom: 0px;
        }
        p{
            font-size:20px;
            text-align:none;
            margin-top:0px;  
        }
    </style>
</head>
<body>
    <h2>Nature Image</h2>
    <p>This is an example showing how the figure and figcaption tags work together.</p>
    <figure>
        <img src="https://blogdestinia.com/wp-content/uploads/2019/06/parque-nacional-banff.jpg" alt="Beautiful Nature" width="300px">
        <figcaption>Fig 1: A beautiful view of nature.</figcaption>
    </figure>

    <p>The caption below the image explains what the picture represents.</p>
</body>
</html>
