<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nav Tag</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            nav {
                background-color: aqua;
                border: 2px solid burlywood;
                margin: 20px;
                padding: 20px;
                text-align: center;
            }

            nav a {
                text-decoration: none;
                color: black;
                font-size: 18px;
                font-weight: bold;
                margin: 0 15px;
            }

            nav a:hover {
                color: red;
            }
        </style>

    </head>

    <body>
        <nav>
            <a href="https://en.wikipedia.org/wiki/HTML5" target="_blank" rel="noopener noreferrer">HTML5</a>
            <a href="https://www.tutorialrepublic.com/css-tutorial/" target="_blank" rel="noopener noreferrer">CSS3</a>
            <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript" target="_blank"
                rel="noopener noreferrer">JavaScript</a>
            <a href="https://www.w3schools.com/nodejs/nodejs_intro.asp" target="_blank"
                rel="noopener noreferrer">Node.js</a>
        </nav>
    </body>

</html>
