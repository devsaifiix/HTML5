<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <style>
        /* Body */
body {
    background-color: #05c46b;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    margin: 0;
}

/* Form */
form {
    background-color: #fff;
    max-width: 500px;
    margin: 50px auto;
    padding: 30px 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    border-radius: 10px;
}

/* Form Control */
.form-control {
    text-align: left;
    margin-bottom: 20px;
}

/* Labels */
.form-control label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

/* Inputs */
.form-control input,
.form-control select,
.form-control textarea {
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: inherit;
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
}

/* Focus Effect */
input:focus,
select:focus,
textarea:focus {
    outline: none;
    border-color: #05c46b;
    box-shadow: 0 0 5px rgba(5, 196, 107, 0.5);
}

/* Radio & Checkbox */
.form-control input[type="radio"],
.form-control input[type="checkbox"] {
    display: inline-block;
    width: auto;
    margin-right: 5px;
}

/* Button */
button {
    background-color: #05c46b;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 18px;
    color: white;
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 20px;
}

/* Button Hover */
button:hover {
    background-color: #04a85a;
    cursor: pointer;
}

/* Mobile */
@media (max-width: 600px) {
    form {
        margin: 20px;
        padding: 20px;
    }
}
    </style>
</head>

<body>
    <h1>MERN Stack Survey Form</h1>

    <form id="form">

        <div class="form-control">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name..." required>
        </div>

        <div class="form-control">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email..." required>
        </div>

        <div class="form-control">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Enter your age...">
        </div>

        <div class="form-control">
            <label for="role">Which option best describes you?</label>
            <select name="role" id="role">
                <option value="student">Student</option>
                <option value="intern">Intern</option>
                <option value="professional">Professional</option>
                <option value="other">Other</option>
            </select>
        </div>

        <fieldset class="form-control">
            <legend>Would you recommend this Course?</legend>

            <label>
                <input type="radio" name="recommend" value="Yes"> Yes
            </label>

            <label>
                <input type="radio" name="recommend" value="No"> No
            </label>

            <label>
                <input type="radio" name="recommend" value="Maybe"> Maybe
            </label>
        </fieldset>

        <fieldset class="form-control">
            <legend>Languages and Frameworks known</legend>

            <label><input type="checkbox" name="skills" value="C"> C</label>
            <label><input type="checkbox" name="skills" value="C++"> C++</label>
            <label><input type="checkbox" name="skills" value="Java"> Java</label>
            <label><input type="checkbox" name="skills" value="Python"> Python</label>
            <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
        </fieldset>

        <div class="form-control">
            <label for="comment">Any comments</label>
            <textarea id="comment" name="comment" placeholder="Enter your comment"></textarea>
        </div>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
