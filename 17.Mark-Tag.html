<!-- The <mark> tag in HTML is used to highlight or mark important text in a webpage. It shows the 
text with a yellow background by default, similar to using a highlighter on paper. This tag is 
useful when you want to draw attention to specific words or phrases in a paragraph.

The <mark> tag is often used to highlight important information, search results, or keywords so 
that users can easily notice them. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Tag</title>
</head>
<body>
    <h1>Example of Mark Tag</h1>

    <p>
        HTML5 is the standard language used to create <mark>webpage</mark>.
        It is very <mark>important</mark> for web development to built a <mark>skeleton</mark> of website.
    </p>
</body>
</html>
