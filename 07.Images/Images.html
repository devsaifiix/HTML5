<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML Images</title>
    </head>

    <body>
        <h1>image from same folder</h1>
        <img src="We-Love-MERN.png" alt="MERN Logo" style="width: 250px; height: 250px;">

        <h1>Image from Another Folder</h1>
        <img src="/Images/MERN-Image.jpg" alt="MERN Image" width="300px" height="230px">

        <h1>Image from Another Server</h1>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxXSn3YYmy-GXB06mzJwNe2R9_DPuKk1jGFJ-NYENrww&s=10"
            alt="MERN Image Loading" width="250px" height="300px">

        <h1>Animated Image</h1>
        <img src="/Images/giphy.webp" alt="Loading Gift" width="250px" height="250px">

        <h1>Image as a Link</h1>
        <a href="https://www.uosahiwal.edu.pk/" target="_blank" rel="noopener noreferrer">
            <img src="/Images/UOS-Pic.jpg" alt="Loading UOS-Pic" width="250px" height="250px">
        </a>
    </body>

</html>
