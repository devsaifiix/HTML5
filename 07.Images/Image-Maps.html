<!-- The HTML <map> tag defines an image map. An image map is an image with clickable areas. 
    The areas are defined with one or more <area> tags. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Maping</title>
</head>
<body>
    <!-- Image Map Generated by http://www.image-map.net/ -->
<img src="../Images/Image-Map.jpg" usemap="#image-map">

<map name="image-map">
    <area target="_blank" alt="laptop" title="laptop" href="laptop.com" coords="37,45,39,349,271,47,270,347,39,349,271,47" shape="poly">
    <area target="_blank" alt="cup" title="cup" href="cup.com" coords="338,302,46" shape="circle">
    <area target="_blank" alt="mobile" title="mobile" href="mobile.com" coords="291,173,331,245" shape="rect">
</map>
</body>
</html>
