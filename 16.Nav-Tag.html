<!-- The <nav> tag in HTML is used to define a navigation section of a webpage. It contains links
that help users move from one page to another within the website. These links are usually called 
the navigation menu.

The <nav> tag is a semantic tag, which means it clearly describes its purpose. It helps browsers, 
search engines, and screen readers understand that the content inside it is used for navigation.

Common links inside the <nav> tag include:
- Home
- About
- Services
- Contact -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Tag</title>

    <style>
        nav{
            background-color: lightblue;
            padding: 10px
        }

        nav a{
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
            color: black;
        }

        nav a:hover{
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Code with Saif</h1>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
    <p>This is the main content of the webpage.</p>
</body>
</html>
