<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Iframe</title>
    </head>

    <body>
        <h2>Official website of uosahiwal</h2>
        <iframe src="https://www.uosahiwal.edu.pk/depart/computer-science" frameborder="0"
            style="width: 900px; height: 500px;"></iframe>

        <h2>Video from YouTube</h2>
        <iframe width="460" height="215" src="https://www.youtube.com/embed/F_MjWrWECK8?si=0fYJuUelOSUkWfQb"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            Your browser does not support iframes.
        </iframe>

        <iframe width="460" height="215" src="https://www.youtube.com/embed/D5AN8xYhRlg?si=3raErrHt5_nsRevu"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            Your browser does not support iframes.
        </iframe>

        <h2>Using Map</h2>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3431.312485712655!2d73.08693937471297!3d30.68148287460904!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3922b7fc5f65c751%3A0xb5f17e730625a55!2zVW5pdmVyc2l0eSBvZiBTYWhpd2FsINis2KfZhdi524Eg2LPYp9uB24zZiNin2YQ!5e0!3m2!1sen!2s!4v1783790839963!5m2!1sen!2s"
            width="400" height="350" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin">
            Your browser does not support iframes.
        </iframe>

        <h2>Iframe - Target for a Link</h2>
        <p><a href="https://www.uosahiwal.edu.pk/" target="demo-iframe">Open UOS Website</a></p>
        <iframe name="demo-iframe" style="border: 2px solid brown; width: 900px; height: 550px;">
            Your browser does not support iframes.
        </iframe>
    </body>

</html>
