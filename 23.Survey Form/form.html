<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>MERN Stack Survey Form</h1>

    <form id="form">

        <div class="form-control">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-control">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-control">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Enter your age">
        </div>

        <div class="form-control">
            <label for="role">Which option best describes you?</label>
            <select name="role" id="role">
                <option value="student">Student</option>
                <option value="intern">Intern</option>
                <option value="professional">Professional</option>
                <option value="other">Other</option>
            </select>
        </div>

        <fieldset class="form-control">
            <legend>Would you recommend GeeksforGeeks?</legend>

            <label>
                <input type="radio" name="recommend" value="Yes"> Yes
            </label>

            <label>
                <input type="radio" name="recommend" value="No"> No
            </label>

            <label>
                <input type="radio" name="recommend" value="Maybe"> Maybe
            </label>
        </fieldset>

        <fieldset class="form-control">
            <legend>Languages and Frameworks known</legend>

            <label><input type="checkbox" name="skills" value="C"> C</label>
            <label><input type="checkbox" name="skills" value="C++"> C++</label>
            <label><input type="checkbox" name="skills" value="Java"> Java</label>
            <label><input type="checkbox" name="skills" value="Python"> Python</label>
            <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
        </fieldset>

        <div class="form-control">
            <label for="comment">Any comments</label>
            <textarea id="comment" name="comment" placeholder="Enter your comment"></textarea>
        </div>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
