<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Table</title>
        <style>
            table{
                border: 1px solid black;
                border-radius: 10px;
            }
            /*  Horizontal Zebra Stripes */
            tr:nth-child(even){
                background-color: #D6EEEE;
            }

            /* Vertical Zebra Stripes */
            td:nth-child(even),
            th:nth-child(even) {
                background-color: #D6EEEE;
            }

            /* Combine Vertical and Horizontal Zebra Stripes */
            tr:nth-child(even) {
                background-color: rgba(150, 212, 212, 0.4);
            }

            th:nth-child(even),
            td:nth-child(even) {
                background-color: rgba(150, 212, 212, 0.4);
            } 

            /* Horizontal Dividers */
            td,
            th {
                border-bottom: 1px solid rgb(13, 193, 130);
            }

            tr:hover{
                background-color: rgb(13, 193, 130);
            }
        </style>
    </head>
