<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Table</title>
        <style>
            table,
            th,
            td {
                border: 1px solid black;
                /* Collapsed Table Borders */
                border-collapse: collapse;
                border-style: dotted;
                border-color:blue;
            }

            th,
            td {
                /* background-color: #96D4D4; */
                /* Round Table Borders */
                border-radius: 10px;
            }
        </style>
    </head>

    <body>
        <table>
            <tr>
                <th>Company</th>
                <th>Contact</th>
                <th>Country</th>
            </tr>
            <tr>
                <td>Alfreds Futterkiste</td>
                <td>Maria Anders</td>
                <td>Germnay</td>
            </tr>
            <tr>
                <td>Centro comercial Mocexuma</td>
                <td>Francisco Chang</td>
                <td>Mexico</td>
            </tr>
            <tr>
                <td>Island Trading</td>
                <td>Helen Bennett</td>
                <td>UK</td>
            </tr>
        </table>
    </body>

</html>
