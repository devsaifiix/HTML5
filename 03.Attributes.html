<!-- HTML attributes provide additional information about HTML elements.
- All HTML elements can have attributes
- Attributes provide additional information about elements
- Attributes are always specified in the start tag
- Attributes usually come in name/value pairs like: name="value" -->
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML5 Attributes</title>
    </head>

    <body>
        <h1>The href Attribute</h1>
        <a href="https://www.uosahiwal.edu.pk/">Visit uosahiwal</a>

        <h2>The src Attribute</h2>
        <img src="https://uosahiwal.edu.pk/storage/images/logo.png" alt="Loading uosahiwal Logo" width="250px" height="250px">
    </body>

</html>
